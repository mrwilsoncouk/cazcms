<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CMS Admin</title>
<style>
:root{--bg:#f0f2f5;--panel:#ffffff;--card:#fff;--muted:#65676b;--text:#1c1e21;--line:#d8dadf;--brand:#1877f2;--danger:#dc2626;--ok:#16a34a}
*{box-sizing:border-box;border-radius:2px!important}
body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:#f0f2f5;color:var(--text)}
.login-wrap{min-height:100vh;display:grid;place-items:center;background:#f0f2f5}
.login{width:min(430px,92vw);background:white;border-radius:2px;padding:28px;box-shadow:0 6px 14px rgba(0,0,0,.08)}
.login h1{margin:0 0 8px}
.login p{color:var(--muted)}
.field{display:grid;gap:7px;margin:14px 0}
label{font-size:13px;font-weight:800;color:#334155}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:2px;padding:11px 12px;font:inherit;background:white}
textarea{min-height:130px}
button{border:0;border-radius:2px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--brand);color:white}
button.secondary{background:#e5e7eb;color:#111827}
button.danger{background:var(--danger)}
button:disabled{opacity:.55;cursor:not-allowed}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:#1877f2;color:white;padding:20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{font-size:20px;font-weight:900;margin-bottom:20px}
.nav{display:grid;gap:6px;padding-bottom:32px}
.nav button{background:transparent;text-align:left;color:#cbd5e1;padding:9px 11px;line-height:1.2}
.nav button.active,.nav button:hover{background:#166fe5;color:white}
.main{padding:24px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.card{background:white;border:1px solid var(--line);border-radius:2px;padding:18px;box-shadow:0 10px 30px rgba(15,23,42,.04);margin-bottom:16px}
.stat{font-size:34px;font-weight:900}
.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:2px}
.table{width:100%;border-collapse:collapse;background:white}
.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
.table th{font-size:12px;text-transform:uppercase;color:#64748b;background:#f8fafc}
.row-actions,.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar{margin:14px 0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.notice{padding:12px 14px;border-radius:2px;margin-bottom:14px;background:#ecfeff;border:1px solid #a5f3fc;color:#155e75}
.error{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.badge{display:inline-block;padding:4px 8px;border-radius:2px;background:#e7f3ff;color:#1877f2;font-size:12px;font-weight:800}
#richEditor{border:1px solid var(--line);border-radius:2px;min-height:190px;padding:14px;background:white}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.media-card{border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#fff}
.media-preview{height:150px;background:#f1f5f9;display:grid;place-items:center}
.media-preview img{max-width:100%;max-height:150px;object-fit:contain}
.media-body{padding:12px}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.topbar{display:block}.main{padding:14px}}
</style>
<link rel="stylesheet" href="/admin-theme.css">
<link rel="stylesheet" href="/admin-polished-theme.css">

<script>
window.safeAdminNav = function(e, view){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  if(view === 'woocommerceImporter'){
    window.location.href = '/admin/woocommerce-import';
    return false;
  }
  try{
    if(typeof window.load === 'function'){ window.load(view); return false; }
    if(typeof load === 'function'){ load(view); return false; }
    if(window.state){ window.state.view = view; }
    if(typeof window.render === 'function'){ window.render(); return false; }
    if(typeof render === 'function'){ render(); return false; }
  }catch(err){ console.error('Admin navigation failed:', err); }
  return false;
};
window.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('[data-view]').forEach(function(btn){
    var view = btn.getAttribute('data-view');
    if(!view) return;
    btn.onclick = function(ev){ return window.safeAdminNav(ev, view); };
  });
});
</script>


<script>
document.addEventListener('click', function(e){
  var btn = e.target.closest('button');
  if(!btn) return;
  var view = btn.getAttribute('data-view') || '';
  var text = (btn.textContent || '').trim().toLowerCase();
  if(view === 'products' || text === 'products'){
    e.preventDefault(); e.stopImmediatePropagation();
    window.location.href = '/admin/products';
  }
  if(view === 'productCategories' || text === 'product categories'){
    e.preventDefault(); e.stopImmediatePropagation();
    window.location.href = '/admin/product-categories';
  }
}, true);
</script>


<script>
document.addEventListener('click', function(e){
  var btn=e.target.closest('button');
  if(!btn) return;
  var view=btn.getAttribute('data-view') || '';
  var text=(btn.textContent||'').trim().toLowerCase();
  if(view==='support' || text==='support'){
    e.preventDefault(); e.stopImmediatePropagation();
    window.location.href='/admin/support-chat';
  }
}, true);
</script>

<link rel="stylesheet" href="/rz-green-storefront.css">
<link rel="stylesheet" href="/rz-standard-area.css">
</head>
<body class="admin-fixed-layout" class="rz-standard-area rz-theme-loaded">
<div id="root"></div>
<script>
(function(){
'use strict';

window.addEventListener('error', function(e){
  var root=document.getElementById('root');
  if(root && !root.innerHTML.trim()){
    root.innerHTML='<div style="padding:24px;font-family:Arial"><h1>Admin error</h1><pre>'+esc(e.message||e.error||e)+'</pre></div>';
  }
});

var state={
  token:localStorage.getItem('cms_token')||'',
  user:null,
  view:'dashboard',
  data:{},
  message:'',
  error:''
};
window.state=state;

var sections=[
  ['dashboard','Dashboard'],['pages','Pages'],['blog','Blog'],['blogCategories','Blog Categories'],
  ['products','Products'],['productCategories','Product Categories'],['orders','Orders'],['users','Users'],
  ['comments','Comments'],['reviews','Home Reviews'],['media','Media'],['imageOptimizer','Image Optimizer'],
  ['woocommerceImporter','WooCommerce Importer'],['notifications','Notifications'],['emails','Email outbox'],
  ['jobs','Jobs'],['support','Support'],['errorLogs','Error Logs'],['backups','Backups'],['settings','Settings'],['audit','Audit']
];

function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function j(v){return JSON.stringify(v).replace(/</g,'\\u003c').replace(/'/g,'&#39;');}
function byId(id){return document.getElementById(id);}
function val(id){var el=byId(id);return el?el.value:'';}

function api(path, opts){
  opts=opts||{};
  opts.headers=opts.headers||{};
  opts.headers['Content-Type']='application/json';
  if(state.token) opts.headers.Authorization='Bearer '+state.token;
  return fetch(path, opts).then(function(r){
    return r.text().then(function(text){
      var data={};
      try{data=text?JSON.parse(text):{};}catch(e){data={raw:text};}
      if(!r.ok) throw new Error(data.error||data.message||'Request failed');
      return data;
    });
  });
}

function setMsg(m){state.message=m;state.error='';render();}
function setErr(e){state.error=String(e&&e.message?e.message:e);state.message='';render();}
function allowedSection(key){if(!state.user)return false;if(state.user.role==='admin')return true;return (state.user.sections||[]).indexOf(key)!==-1;}
function isAdmin(){return state.user&&state.user.role==='admin';}
function title(v){for(var i=0;i<sections.length;i++){if(sections[i][0]===v)return sections[i][1];}return v;}

function boot(){
  if(!state.token){render();return;}
  api('/api/auth/me').then(function(me){
    state.user=me.user;
    if(!me.user.isStaff){location.href='/account';return;}
    return load(state.view);
  }).catch(function(){
    localStorage.removeItem('cms_token');
    state.token='';
    render();
  });
}

function login(ev){
  if(ev)ev.preventDefault();
  api('/api/auth/login',{method:'POST',body:JSON.stringify({email:val('email'),password:val('password')})}).then(function(res){
    state.token=res.token;
    state.user=res.user;
    localStorage.setItem('cms_token',res.token);
    if(!res.user.isStaff){location.href='/account';return;}
    return load('dashboard');
  }).catch(setErr);
}
window.login=login;

function logout(){
  api('/api/auth/logout',{method:'POST'}).catch(function(){}).then(function(){
    localStorage.removeItem('cms_token');
    state.token='';
    state.user=null;
    render();
  });
}
window.logout=logout;

function testApi(){
  api('/api/health').then(function(r){alert('API OK: '+r.status);}).catch(function(e){alert(e.message);});
}
window.testApi=testApi;

function load(view){
  if(view==='woocommerceImporter'){
    window.location.href='/admin/woocommerce-import';
    return;
  }

  

  

  state.view=view;
  state.error='';
  state.message='';
  var p;
  if(view==='dashboard') p=api('/api/dashboard').then(function(x){state.data.dashboard=x;});
  else if(view==='blog') p=Promise.all([api('/api/posts'),api('/api/blog-categories')]).then(function(a){state.data.posts=a[0];state.data.blogCategories=a[1];});
  else if(view==='blogCategories') p=api('/api/blog-categories').then(function(x){state.data.blogCategories=x;});
  else if(view==='settings') p=Promise.all([api('/api/settings'),api('/api/themes')]).then(function(a){state.data.settings=a[0];state.data.themes=a[1];});
  else if(view==='audit') p=api('/api/audit').then(function(x){state.data.audit=x;});
  else if(view==='productCategories') p=api('/api/product-categories?limit=10000').then(function(x){state.data.productCategories=x;});
  else if(view==='products') p=Promise.all([api('/api/products?limit=10000'),api('/api/product-categories?limit=10000')]).then(function(a){state.data.products=a[0];state.data.productCategories=a[1];});
  else if(['pages','posts','orders','users','comments','reviews','media','notifications','emails','jobs','support','errorLogs','backups'].indexOf(view)!==-1) p=api('/api/'+view+'?limit=10000').then(function(x){state.data[view]=x;});
  else p=Promise.resolve();
  return p.catch(function(e){state.error=e.message;}).then(render);
}
window.load=load;

function render(){
  var root=byId('root');
  if(!state.token||!state.user){
    root.innerHTML='<div class="login-wrap"><form class="login" onsubmit="login(event)">'+
      '<h1>CMS Admin</h1><p>Log in with your admin account.</p>'+
      (state.error?'<div class="notice error">'+esc(state.error)+'</div>':'')+
      '<div class="field"><label>Email</label><input id="email" type="email" required></div>'+
      '<div class="field"><label>Password</label><input id="password" type="password" required></div>'+
      '<button type="submit">Login</button> <button class="secondary" type="button" onclick="testApi()">Test API</button>'+
    '</form></div>';
    return;
  }
  if(!allowedSection(state.view)) state.view=(state.user.sections&&state.user.sections[0])||'dashboard';
  root.innerHTML='<div class="app"><aside class="sidebar"><div class="brand">CMS Admin</div><div class="nav">'+
    sections.filter(function(s){return allowedSection(s[0]);}).map(function(s){return '<button class="'+(state.view===s[0]?'active':'')+'" onclick="load(\''+s[0]+'\')">'+esc(s[1])+'</button>';}).join('')+
    '</div></aside><main class="main"><div class="topbar"><div><h1>'+esc(title(state.view))+'</h1><div style="color:#64748b">'+esc(state.user.email)+' · '+esc(state.user.role)+'</div></div>'+
    '<div class="row-actions"><button class="secondary" onclick="window.open(\'/\',\'_blank\')">View site</button><button class="secondary" onclick="window.open(\'/account\',\'_blank\')">My Account</button><button class="secondary" onclick="window.open(\'/admin/menu\',\'_blank\')">Open Menu</button>'+(state.user.role==='admin'?'<button onclick="queueBuild()">Rebuild menu/site</button>':'')+'<button class="danger" onclick="logout()">Logout</button></div></div>'+
    (state.message?'<div class="notice">'+esc(state.message)+'</div>':'')+
    (state.error?'<div class="notice error">'+esc(state.error)+'</div>':'')+
    '<div id="content">'+renderView()+'</div></main></div>';
}
window.render=render;

function renderView(){
  if(state.view==='woocommerceImporter'){ window.location.href='/admin/woocommerce-import'; return ''; }

  if(state.view==='dashboard')return dashboard();
  if(state.view==='pages')return contentList('pages');
  if(state.view==='products')return products();
  if(state.view==='productCategories')return productCategories();
  if(state.view==='blog')return blogPlatform();
  if(state.view==='blogCategories')return blogCategories();
  if(state.view==='orders')return orders();
  if(state.view==='users')return users();
  if(state.view==='reviews')return reviews();
  if(state.view==='media')return media();
  if(state.view==='settings')return settings();
  if(state.view==='backups')return backups();
  if(state.view==='support')return support();
  if(state.view==='imageOptimizer')return imageOptimizer();
  if(state.view==='woocommerceImporter')return wooImporter();
  if(state.view==='audit')return audit();
  if(state.view==='comments')return genericList('comments',['author','content','status','createdAt']);
  if(state.view==='notifications')return genericList('notifications',['title','message','read','createdAt']);
  if(state.view==='emails')return genericList('emails',['to','subject','template','status','createdAt']);
  if(state.view==='jobs')return genericList('jobs',['type','status','createdAt','updatedAt']);
  if(state.view==='errorLogs')return genericList('errorLogs',['message','path','createdAt']);
  return '<div class="card">No view.</div>';
}

function queueBuild(){api('/api/build',{method:'POST'}).then(function(){setMsg('Static site, menu and route manifest rebuilt.');return load(state.view);}).catch(setErr);}
window.queueBuild=queueBuild;

function dashboard(){
  var d=state.data.dashboard||{stats:{},navigation:[],recentAudit:[],settings:{}};var s=d.stats||{};
  return '<div class="grid">'+Object.keys(s).map(function(k){return '<div class="card"><h3>'+esc(k)+'</h3><div class="stat">'+esc(s[k])+'</div></div>';}).join('')+'</div>'+
  '<div class="card"><h3>Live menu</h3><div>'+((d.navigation||[]).map(function(n){return '<a class="badge" href="'+esc(n.slug)+'" target="_blank">'+esc(n.title)+'</a>';}).join(' ')||'No menu items yet.')+'</div></div>'+
  '<div class="card"><h3>Recent activity</h3>'+auditTable(d.recentAudit||[])+'</div>';
}

function selectedIds(prefix){
  return Array.from(document.querySelectorAll('input[data-bulk="'+prefix+'"]:checked')).map(function(x){return x.value;}).filter(Boolean);
}
function toggleBulk(prefix, checked){
  Array.from(document.querySelectorAll('input[data-bulk="'+prefix+'"]')).forEach(function(x){x.checked=!!checked;});
}
function bulkDelete(type,label){
  var ids=selectedIds(type);
  if(!ids.length){alert('Select at least one '+label+' first.');return;}
  if(!confirm('Delete '+ids.length+' selected '+label+'?'))return;
  var endpoint=type==='productCategories'?'product-categories':type;
  var chain=Promise.resolve();
  ids.forEach(function(id){
    chain=chain.then(function(){return api('/api/'+endpoint+'/'+encodeURIComponent(id),{method:'DELETE'});});
  });
  chain.then(function(){setMsg('Deleted '+ids.length+' '+label+'.');return load(state.view);}).catch(setErr);
}
window.toggleBulk=toggleBulk;window.bulkDelete=bulkDelete;

function contentList(type){
  var res=state.data[type]||{items:[]};var items=res.items||[];
  return '<div class="toolbar"><button onclick="editContent(\''+type+'\')">Create '+(type==='pages'?'page':'post')+'</button><input placeholder="Search..." onkeydown="if(event.key===\'Enter\') searchList(\''+type+'\',this.value)"></div>'+
  '<div class="table-wrap"><table class="table"><thead><tr><th>Title</th><th>Slug</th><th>Status</th><th>Menu</th><th>Order</th><th>Updated</th><th></th></tr></thead><tbody>'+
  (items.map(function(item){return '<tr><td>'+esc(item.title)+'</td><td>'+esc(item.slug)+'</td><td><span class="badge">'+esc(item.status)+'</span></td><td>'+(type==='pages'?(item.showInMenu!==false?'Yes':'No'):'-')+'</td><td>'+(type==='pages'?esc(item.menuOrder==null?100:item.menuOrder):'-')+'</td><td>'+esc(item.updatedAt||'')+'</td><td class="row-actions"><button class="secondary" onclick=\'editContent("'+type+'",'+j(item)+')\'>Edit</button><button class="danger" onclick="removeItem(\''+type+'\',\''+esc(item.id)+'\')">Delete</button></td></tr>';}).join('')||'<tr><td colspan="7">No items yet.</td></tr>')+
  '</tbody></table></div>';
}

function editContent(type,item){
  item=item||{};var isPage=type==='pages';
  byId('content').innerHTML='<div class="card"><h2>'+(item.id?'Edit':'Create')+' '+(isPage?'page':'post')+'</h2><div class="form-grid">'+
  '<div class="field"><label>Title</label><input id="f_title" value="'+esc(item.title||'')+'"></div>'+
  '<div class="field"><label>Slug</label><input id="f_slug" value="'+esc(item.slug||'')+'"></div>'+
  '<div class="field"><label>Status</label><select id="f_status">'+['draft','published','scheduled','archived'].map(function(x){return '<option '+(item.status===x?'selected':'')+'>'+x+'</option>';}).join('')+'</select></div>'+
  (isPage?'<div class="field"><label>Menu title</label><input id="f_menuTitle" value="'+esc(item.menuTitle||item.title||'')+'"></div><div class="field"><label>Show in menu</label><select id="f_showInMenu"><option value="true" '+(item.showInMenu!==false?'selected':'')+'>yes</option><option value="false" '+(item.showInMenu===false?'selected':'')+'>no</option></select></div><div class="field"><label>Menu order</label><input id="f_menuOrder" type="number" value="'+esc(item.menuOrder==null?100:item.menuOrder)+'"></div>':'')+
  '<div class="field"><label>SEO title</label><input id="f_seoTitle" value="'+esc(item.seoTitle||'')+'"></div>'+
  '<div class="field full"><label>SEO description</label><input id="f_seoDescription" value="'+esc(item.seoDescription||'')+'"></div>'+
  '<div class="field full"><label>Content</label><div id="richEditor" contenteditable="true">'+(item.content||'')+'</div></div></div>'+
  '<div class="row-actions"><button onclick="saveContent(\''+type+'\',\''+(item.id||'')+'\')">Save</button><button class="secondary" onclick="load(\''+type+'\')">Cancel</button></div></div>';
}
window.editContent=editContent;

function saveContent(type,id){
  var body={title:val('f_title'),slug:val('f_slug'),status:val('f_status'),seoTitle:val('f_seoTitle'),seoDescription:val('f_seoDescription'),content:byId('richEditor').innerHTML,type:type==='pages'?'page':'post'};
  if(type==='pages'){body.menuTitle=val('f_menuTitle');body.showInMenu=val('f_showInMenu')==='true';body.menuOrder=Number(val('f_menuOrder')||100);}
  api('/api/'+type+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(body)}).then(function(){setMsg('Saved.');return load(type);}).catch(setErr);
}
window.saveContent=saveContent;


function adminFilteredProducts(){
  const res = state.data.products || {items:[]};
  const items = res.items || [];
  const f = state.productFilters || {q:'',status:'',category:'',stock:''};
  const q = String(f.q || '').toLowerCase();

  return items.filter(p=>{
    const text = JSON.stringify({
      title:p.title || p.name || '',
      sku:p.sku || '',
      slug:p.slug || '',
      price:p.price || '',
      stock:p.stock || '',
      status:p.status || ''
    }).toLowerCase();

    if(q && !text.includes(q)) return false;
    if(f.status && String(p.status || '') !== f.status) return false;
    if(f.category && !(p.categoryIds || []).includes(f.category) && String(p.categoryId || '') !== f.category) return false;

    if(f.stock === 'in') {
      if(Number(p.stock || 0) <= 0) return false;
    }
    if(f.stock === 'out') {
      if(Number(p.stock || 0) > 0) return false;
    }

    return true;
  });
}

function adminFilteredCategories(){
  const res = state.data.productCategories || {items:[]};
  const items = res.items || [];
  const f = state.categoryFilters || {q:'',showInShop:'',parentId:''};
  const q = String(f.q || '').toLowerCase();

  return items.filter(c=>{
    const text = JSON.stringify({
      name:c.name || '',
      slug:c.slug || '',
      description:c.description || '',
      parentId:c.parentId || '',
      menuOrder:c.menuOrder || ''
    }).toLowerCase();

    if(q && !text.includes(q)) return false;
    if(f.showInShop === 'yes' && c.showInShop === false) return false;
    if(f.showInShop === 'no' && c.showInShop !== false) return false;
    if(f.parentId && String(c.parentId || '') !== f.parentId) return false;

    return true;
  });
}

function adminPager(key,total){
  const size = Number(state.adminPageSize || 50);
  const pageKey = key === 'products' ? 'productPage' : 'categoryPage';
  const current = Math.max(1, Number(state[pageKey] || 1));
  const totalPages = Math.max(1, Math.ceil(total / size));
  if(current > totalPages) state[pageKey] = totalPages;
  const page = Math.max(1, Math.min(Number(state[pageKey] || 1), totalPages));
  return { page, totalPages, size, start:(page-1)*size, end:(page-1)*size+size };
}

function adminPagination(key,pager,total){
  if(pager.totalPages <= 1) {
    return `<div class="notice">Showing ${total} item${total===1?'':'s'}.</div>`;
  }

  let nums = [];
  const start = Math.max(1, pager.page - 3);
  const end = Math.min(pager.totalPages, pager.page + 3);

  for(let i=start;i<=end;i++) nums.push(i);

  return `<div class="toolbar">
    <button class="secondary" ${pager.page<=1?'disabled':''} onclick="setAdminPage('${key}',1)">First</button>
    <button class="secondary" ${pager.page<=1?'disabled':''} onclick="setAdminPage('${key}',${pager.page-1})">Prev</button>
    ${nums.map(n=>`<button class="${n===pager.page?'':'secondary'}" onclick="setAdminPage('${key}',${n})">${n}</button>`).join('')}
    <button class="secondary" ${pager.page>=pager.totalPages?'disabled':''} onclick="setAdminPage('${key}',${pager.page+1})">Next</button>

<script src="/admin-direct-links.js"></script>
<script src="/rz-theme-loader.js"></script>

<link rel="stylesheet" href="/admin/pp-theme.css">

<script>
(function(){

function applyPPTheme(enabled){
  if(enabled){
    document.body.classList.add('pp-theme');
  }else{
    document.body.classList.remove('pp-theme');
  }
  localStorage.setItem('pp-theme-enabled', enabled ? '1' : '0');
}

window.addEventListener('DOMContentLoaded', function(){

  const topbar = document.querySelector('.topbar');

  if(topbar){

    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.gap = '10px';
    wrap.style.alignItems = 'center';

    wrap.innerHTML = `
      <label style="font-weight:700">Theme</label>

      <select id="pp-theme-switcher">
        <option value="default">Default</option>
        <option value="pp">PP Theme</option>
      </select>

      <button id="pp-lock-btn">Lock CMS</button>
    `;

    topbar.appendChild(wrap);

    const savedTheme = localStorage.getItem('pp-theme-enabled') === '1';

    if(savedTheme){
      document.getElementById('pp-theme-switcher').value = 'pp';
      applyPPTheme(true);
    }

    document.getElementById('pp-theme-switcher').addEventListener('change', function(){
      applyPPTheme(this.value === 'pp');
    });

    async function updateLockButton(){
      try{
        const r = await fetch('/api/cms-lock');
        const d = await r.json();
        document.getElementById('pp-lock-btn').textContent = d.locked ? 'Unlock CMS' : 'Lock CMS';
      }catch(e){}
    }

    document.getElementById('pp-lock-btn').addEventListener('click', async function(){
      const r = await fetch('/api/cms-lock/toggle',{method:'POST'});
      const d = await r.json();
      this.textContent = d.locked ? 'Unlock CMS' : 'Lock CMS';
      alert(d.locked ? 'CMS Locked' : 'CMS Unlocked');
    });

    updateLockButton();
  }

});

})();
</script>
<link rel="stylesheet" href="/admin/pp-theme.css">

<script>
(function () {

  function setTheme(mode) {

    document.body.classList.toggle(
      'pp-theme',
      mode === 'pp'
    );

    localStorage.setItem(
      'pp-theme',
      mode
    );
  }

  window.addEventListener(
    'DOMContentLoaded',
    async () => {

      const topbar =
        document.querySelector('.topbar');

      if (!topbar) return;

      const wrap =
        document.createElement('div');

      wrap.style.display = 'flex';
      wrap.style.alignItems = 'center';
      wrap.style.gap = '10px';

      wrap.innerHTML = `
        <span style="font-weight:700">
          Theme
        </span>

        <select id="themeSelect">
          <option value="default">
            Default
          </option>

          <option value="pp">
            PP Theme
          </option>
        </select>

        <button id="lockBtn">
          Loading...
        </button>

        <span id="buildVersion"
          style="
            font-size:12px;
            opacity:.7;
            margin-left:10px;
          ">
        </span>
      `;

      topbar.appendChild(wrap);

      const select =
        document.getElementById(
          'themeSelect'
        );

      const saved =
        localStorage.getItem(
          'pp-theme'
        ) || 'default';

      select.value = saved;

      setTheme(saved);

      select.addEventListener(
        'change',
        () => {
          setTheme(select.value);
        }
      );

      async function refreshLock() {

        try {

          const r =
            await fetch(
              '/api/cms-lock'
            );

          const d =
            await r.json();

          document.getElementById(
            'lockBtn'
          ).textContent =
            d.locked
              ? 'Unlock CMS'
              : 'Lock CMS';

          document.getElementById(
            'buildVersion'
          ).textContent =
            d.version || 'v1.12';

        } catch (e) {
          console.error(e);
        }
      }

      document.getElementById(
        'lockBtn'
      ).addEventListener(
        'click',
        async () => {

          const r =
            await fetch(
              '/api/cms-lock/toggle',
              {
                method: 'POST'
              }
            );

          const d =
            await r.json();

          document.getElementById(
            'lockBtn'
          ).textContent =
            d.locked
              ? 'Unlock CMS'
              : 'Lock CMS';
        }
      );

      refreshLock();
    }
  );

})();
</script>
</body>
</html>
